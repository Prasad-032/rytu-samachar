name: rytu_samachar
description: Farmer information app for Telugu-speaking farmers
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_messaging: ^14.7.9
  http: ^1.2.0
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  flutter_local_notifications: ^16.3.0
  url_launcher: ^6.2.4
  intl: ^0.18.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
